<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 540" role="img" aria-label="Hand-drawn cross-section of a tree: the canopy is labeled HTML, CSS and JS; the trunk is labeled Go; the roots are labeled SQL; the mycelium threads below are labeled TCP and goroutines.">
  <style>
    .ln { stroke: #2C3527; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .ln-thin { stroke: #2C3527; stroke-width: 1.4; fill: none; stroke-linecap: round; }
    .myc { stroke: #4E6B3C; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-dasharray: .5 6; }
    .connector { stroke: #6E5439; stroke-width: 1; fill: none; stroke-dasharray: 3 4; opacity: .7; }
